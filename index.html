document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 SIDEBAR \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */\n.sidebar{\n  width:var(--sidebar-w);background:var(--c-surface);border-right:1px solid var(--c-border);\n  display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:120;\n  transition:width 250ms var(--ease);overflow:visible;\n}\n.collapsed .sidebar{width:var(--sidebar-cw)}\n\n.sidebar-brand{\n  height:var(--hdr-h);display:flex;align-items:center;gap:10px;padding:0 14px;\n  border-bottom:1px solid var(--c-border);flex-shrink:0;position:relative;overflow:visible;z-index:2;\n}\n.brand-icon{\n  width:28px;height:28px;background:var(--c-text);border-radius:7px;\n  display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0;\n}\n.brand-name{font-size:13px;font-weight:600;letter-spacing:-0.02em;white-space:nowrap;overflow:hidden}\n.brand-version{\n  font-size:10px;color:var(--c-text-2);background:#fff;border:1px solid var(--c-border-s);\n  padding:1px 6px;border-radius:4px;font-weight:600;white-space:nowrap;flex-shrink:0;\n}\n.collapsed .brand-name,.collapsed .brand-version{opacity:0;width:0;overflow:hidden}\n\n/* Collapse toggle */\n.collapse-btn{\n  position:absolute;right:-13px;top:50%;transform:translateY(-50%);\n  width:26px;height:26px;border-radius:50%;background:var(--c-text);border:1.5px solid #fff;\n  display:flex;align-items:center;justify-content:center;z-index:1000;cursor:pointer;\n  box-shadow:0 2px 8px rgba(15,15,17,.3),0 0 0 1px rgba(15,15,17,.15);\n  transition:transform 180ms var(--ease),box-shadow 180ms var(--ease),background 180ms var(--ease);\n}\n.collapse-btn:hover{background:var(--c-accent);box-shadow:0 3px 12px rgba(37,99,235,.35)}\n.collapse-btn svg{width:12px;height:12px;color:#fff;transition:transform 250ms var(--ease)}\n.collapse-btn:hover svg{color:#fff}\n.collapsed .collapse-btn svg{transform:rotate(180deg)}\n\n/* Nav */\n.sidebar-nav{padding:10px 8px;flex:1;overflow-y:auto;overflow-x:hidden;min-height:0}\n.nav-section-label{\n  font-size:10px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;\n  color:var(--c-text-3);padding:8px 8px 4px;white-space:nowrap;overflow:hidden;\n}\n.collapsed .nav-section-label{text-align:center;font-size:0;padding:6px 0}\n.collapsed .nav-section-label::after{content:'';display:block;width:16px;height:1px;background:var(--c-border);margin:0 auto}\n\n.nav-item{\n  display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:var(--radius-s);\n  color:var(--c-text-2);font-size:13px;font-weight:450;width:100%;text-align:left;\n  transition:background 150ms var(--ease),color 150ms var(--ease);white-space:nowrap;position:relative;\n}\n.nav-item:hover{background:var(--c-bg);color:var(--c-text)}\n.nav-item.active{background:var(--c-info-bg);color:var(--c-accent);font-weight:550}\n.nav-item.active svg{color:var(--c-accent)}\n.nav-item svg{flex-shrink:0;opacity:0.7}\n.nav-item.active svg{opacity:1}\n.nav-item .nav-label{overflow:hidden;text-overflow:ellipsis}\n\n/* Collapsed nav */\n.collapsed .nav-item{justify-content:center;padding:9px 0}\n.collapsed .nav-item .nav-label{display:none}\n.collapsed .nav-item.active::after{\n  content:'';position:absolute;bottom:2px;left:50%;transform:translateX(-50%);\n  width:5px;height:5px;border-radius:50%;background:var(--c-accent);\n}\n\n/* Sidebar footer */\n.sidebar-footer{\n  padding:12px 14px 14px;border-top:1px solid var(--c-border);flex-shrink:0;\n}\n.sidebar-credit{font-size:10px;color:var(--c-text-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}\n.collapsed .sidebar-credit{font-size:0}\n\n/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 MAIN AREA \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */\n.main-area{\n  margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;min-width:0;\n  transition:margin-left 250ms var(--ease);\n}\n.collapsed .main-area{margin-left:var(--sidebar-cw)}\n\n/* \u2500\u2500 Topbar \u2500\u2500 */\n.topbar{\n  height:var(--hdr-h);background:var(--c-surface);border-bottom:1px solid var(--c-border);\n  display:flex;align-items:center;justify-content:space-between;padding:0 24px;\n  position:sticky;top:0;z-index:50;gap:16px;\n}\n.topbar-left{display:flex;flex-direction:column;gap:1px;min-width:0}\n.page-title{font-size:15px;font-weight:650;letter-spacing:-0.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}\n.page-subtitle{font-size:11px;color:var(--c-text-3)}\n.topbar-right{display:flex;align-items:center;gap:8px;flex-shrink:0;margin-left:auto}\n\n.filter-chip{\n  display:flex;align-items:center;gap:5px;background:var(--c-bg);border:1px solid var(--c-border);\n  border-radius:7px;padding:5px 10px;font-size:12px;\n}\n.filter-chip label{font-weight:500;color:var(--c-text-3);font-size:10.5px;white-space:nowrap}\n.filter-chip select{\n  background:none;border:none;font-size:12px;color:var(--c-text);font-weight:500;\n  cursor:pointer;outline:none;font-family:inherit;padding-right:2px;\n}\n\n.live-badge{\n  display:flex;align-items:center;gap:5px;background:var(--c-pos-bg);border:1px solid var(--c-pos-bd);\n  border-radius:6px;padding:4px 9px;font-size:11px;color:var(--c-positive);font-weight:600;\n}\n.live-dot{width:6px;height:6px;border-radius:50%;background:var(--c-positive);animation:pulse 2s infinite}\n@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}\n\n/* \u2500\u2500 Page Content \u2500\u2500 */\n.page-content{padding:20px 24px 32px;width:100%;max-width:none;box-sizing:border-box}\n.tab{display:none}.tab.active{display:block}\n\n/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 KPI CARDS \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */\n.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:18px}\n.kpi-card{\n  background:var(--c-surface);border:1px solid var(--c-border);border-radius:var(--radius);\n  padding:16px 18px;box-shadow:var(--shadow-xs);position:relative;overflow:hidden;\n  transition:box-shadow 180ms var(--ease),transform 180ms var(--ease);\n}\n.kpi-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}\n.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:transparent}\n.kpi-card.s-pos::before{background:var(--c-positive)}\n.kpi-card.s-warn::before{background:var(--c-warning)}\n.kpi-card.s-dang::before{background:var(--c-danger)}\n.kpi-card.s-acc::before{background:var(--c-accent)}\n\n.kpi-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}\n.kpi-label{font-size:11px;font-weight:500;color:var(--c-text-3);text-transform:uppercase;letter-spacing:0.02em}\n.kpi-icon{\n  width:30px;height:30px;border-radius:var(--radius-s);\n  display:flex;align-items:center;justify-content:center;flex-shrink:0;\n}\n.kpi-icon.pos{background:var(--c-pos-bg);color:var(--c-positive)}\n.kpi-icon.warn{background:var(--c-warn-bg);color:var(--c-warning)}\n.kpi-icon.dang{background:var(--c-dang-bg);color:var(--c-danger)}\n.kpi-icon.acc{background:var(--c-info-bg);color:var(--c-accent)}\n.kpi-icon.neu{background:var(--c-bg);color:var(--c-text-2)}\n.kpi-value{font-size:24px;font-weight:650;letter-spacing:-0.03em;line-height:1.1;margin-bottom:5px}\n.kpi-value.v-d{color:var(--c-danger)}.kpi-value.v-w{color:var(--c-warning)}.kpi-value.v-p{color:var(--c-positive)}\n.kpi-sub{font-size:11px;color:var(--c-text-3);line-height:1.4}\n\n/* Merged KPI */\n.kpi-merged{\n  background:var(--c-surface);border:1px solid var(--c-border);border-radius:var(--radius);\n  padding:16px 18px;box-shadow:var(--shadow-xs);position:relative;overflow:hidden;\n  transition:box-shadow 180ms var(--ease);\n}\n.kpi-merged::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--c-danger)}\n.kpi-merged:hover{box-shadow:var(--shadow-md)}\n.kpi-merged-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}\n.kpi-merged-value{font-size:24px;font-weight:650;letter-spacing:-0.03em;color:var(--c-danger);line-height:1.1}\n.kpi-merged-divider{margin:10px 0;border:none;border-top:1px solid var(--c-border)}\n.kpi-merged-secondary{display:flex;align-items:center;justify-content:space-between}\n.kpi-merged-sec-label{font-size:10px;font-weight:500;color:var(--c-text-3);text-transform:uppercase;letter-spacing:0.05em}\n.kpi-merged-sec-value{font-size:14px;font-weight:650;color:var(--c-warning);letter-spacing:-0.02em}\n\n/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 CALLOUT INSIGHTS \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */\n.callout{\n  display:flex;align-items:center;gap:16px;padding:12px 18px;\n  background:var(--c-surface);border:1px solid var(--c-border);border-radius:var(--radius);\n  margin-bottom:12px;box-shadow:var(--shadow-xs);\n}\n.callout::before{\n  content:'';width:3px;align-self:stretch;border-radius:2px;flex-shrink:0;\n}\n.callout.c-danger::before{background:var(--c-danger)}\n.callout.c-warn::before{background:var(--c-warning)}\n.callout.c-info::before{background:var(--c-accent)}\n.callout.c-pos::before{background:var(--c-positive)}\n.callout-metric{\n  font-size:22px;font-weight:700;letter-spacing:-0.03em;line-height:1;\n  flex-shrink:0;min-width:68px;\n}\n.callout.c-danger .callout-metric{color:var(--c-danger)}\n.callout.c-warn .callout-metric{color:var(--c-warning)}\n.callout.c-info .callout-metric{color:var(--c-accent)}\n.callout.c-pos .callout-metric{color:var(--c-positive)}\n.callout-body{flex:1;min-width:0}\n.callout-title{font-size:12.5px;font-weight:600;color:var(--c-text);line-height:1.35}\n.callout-desc{font-size:11px;color:var(--c-text-3);line-height:1.45;margin-top:2px}\n.callout-tag{\n  display:inline-flex;align-items:center;font-size:10px;font-weight:600;\n  padding:1px 6px;border-radius:3px;margin-left:8px;vertical-align:middle;\n}\n.callout.c-danger .callout-tag{background:var(--c-dang-bg);color:var(--c-danger)}\n.callout.c-warn .callout-tag{background:var(--c-warn-bg);color:var(--c-warning)}\n.callout.c-info .callout-tag{background:var(--c-info-bg);color:var(--c-accent)}\n.callout.c-pos .callout-tag{background:var(--c-pos-bg);color:var(--c-positive)}\n\n/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 CARDS & CHARTS \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */\n.chart-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}\n.chart-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:14px}\n.card{background:var(--c-surface);border:1px solid var(--c-border);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow-xs);margin-bottom:14px}\n.card-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px}\n.card-title{font-size:13px;font-weight:600;letter-spacing:-0.01em}\n.card-sub{font-size:11px;color:var(--c-text-3);margin-top:2px}\n.section-heading{\n  font-size:11px;font-weight:600;color:var(--c-text-3);text-transform:uppercase;letter-spacing:0.07em;\n  margin-bottom:12px;margin-top:4px;display:flex;align-items:center;gap:8px;\n}\n.section-heading::after{content:'';flex:1;height:1px;background:var(--c-border)}\n\n/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 PILLS \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */\n.pill{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;font-size:10.5px;font-weight:600;letter-spacing:0.01em}\n.pill-danger{background:var(--c-dang-bg);color:var(--c-danger);border:1px solid var(--c-dang-bd)}\n.pill-pos{background:var(--c-pos-bg);color:var(--c-positive);border:1px solid var(--c-pos-bd)}\n.pill-warn{background:var(--c-warn-bg);color:var(--c-warning);border:1px solid var(--c-warn-bd)}\n.pill-accent{background:var(--c-info-bg);color:var(--c-accent);border:1px solid var(--c-info-bd)}\n\n/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 TABLE \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */\n.data-tbl{width:100%;border-collapse:collapse;font-size:12.5px}\n.data-tbl th{text-align:left;padding:8px 12px;border-bottom:1px solid var(--c-border);color:var(--c-text-3);font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;white-space:nowrap}\n.data-tbl td{padding:9px 12px;border-bottom:1px solid var(--c-border)}\n.data-tbl tbody tr:last-child td{border-bottom:none}\n.data-tbl tbody tr:hover{background:var(--c-bg)}\n\n/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 OTA CARDS \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */\n.ota-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:16px}\n.ota-card{background:var(--c-surface);border:1px solid var(--c-border);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow-xs);position:relative;overflow:hidden}\n.ota-card::after{content:'';position:absolute;top:12px;right:14px;width:7px;height:7px;border-radius:50%;background:var(--c-border-s)}\n.ota-card.best::after{background:var(--c-positive)}.ota-card.worst::after{background:var(--c-danger)}\n.ota-brand{display:flex;align-items:center;gap:8px;margin-bottom:6px}\n.ota-logo{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px;font-weight:800;color:#fff;overflow:hidden}\n.ota-logo img{width:100%;height:100%;object-fit:cover}\n.ota-name{font-size:12px;font-weight:600}\n.ota-commission-rate{font-size:11px;color:var(--c-text-3);margin-bottom:10px}\n.ota-value{font-size:20px;font-weight:700;letter-spacing:-0.03em;margin-bottom:10px}\n.ota-stats{display:grid;grid-template-columns:1fr 1fr;gap:6px}\n.ota-stat{background:var(--c-bg);border-radius:6px;padding:6px 8px}\n.ota-stat-label{font-size:9.5px;color:var(--c-text-3);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:1px}\n.ota-stat-value{font-size:13px;font-weight:650}\n\n/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 FOOTER \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */\n.footer{margin-top:8px;padding:16px 24px;font-size:11px;color:var(--c-text-3);border-top:1px solid var(--c-border);display:flex;align-items:center;justify-content:space-between}\n\n@media(max-width:900px){\n  .sidebar{display:none}.main-area{margin-left:0!important}\n  .chart-grid-2,.chart-grid-3{grid-template-columns:1fr}\n  .kpi-grid{grid-template-columns:repeat(2,1fr)}\n}\n</style>\n</head>\n<body>\n<div class=\"shell\" id=\"shell\">\n\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 SIDEBAR \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n<aside class=\"sidebar\">\n  <div class=\"sidebar-brand\">\n    <div class=\"brand-icon\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 32 32\" fill=\"none\"><rect x=\"4\" y=\"10\" width=\"24\" height=\"16\" rx=\"2\" fill=\"#fff\" opacity=\".3\"></rect><path d=\"M4 12a2 2 0 0 1 2-2h20a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V12z\" fill=\"#fff\" opacity=\".15\"></path><path d=\"M16 4L4 10h24L16 4z\" fill=\"#fff\"></path><rect x=\"9\" y=\"16\" width=\"4\" height=\"6\" rx=\"0.5\" fill=\"#fff\" opacity=\".6\"></rect><rect x=\"14\" y=\"14\" width=\"4\" height=\"8\" rx=\"0.5\" fill=\"#fff\" opacity=\".8\"></rect><rect x=\"19\" y=\"16\" width=\"4\" height=\"6\" rx=\"0.5\" fill=\"#fff\" opacity=\".6\"></rect></svg></div>\n    <span class=\"brand-name\">HBI</span>\n    <span class=\"brand-version\">v4</span>\n    <butto
